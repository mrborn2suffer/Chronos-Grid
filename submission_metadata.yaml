# ============================================================================
# AI tools declaration
# ============================================================================
ai_tools_used:
  - "Gemini"

ai_usage_summary: |
  Used Gemini (Antigravity AI coding assistant) for implementing the hybrid candidate scoring ranker, 
  conducting honeypot validation checks, and drafting the final deck. No candidate profile data was fed 
  to external APIs.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  A hybrid rule-based and vector-space scoring model. Fits a TF-IDF text similarity layer on candidate 
  summaries and descriptions against JD keywords. Integrates a strict career experience curve (peak 5-9 
  years), service-company exclusion penalty (100% service-company careers are penalized), and required 
  skills mapping (vector databases, embeddings, evaluation). Activity, notice period, and location 
  preferences are combined into a multiplicative behavioral multiplier. Honeypots are strictly filtered 
  via Krutrim/Sarvam AI foundation dates and career duration validations.

